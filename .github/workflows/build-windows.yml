name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'win-v*'

# Needed so the workflow can create/update the Windows release.
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r src/requirements.txt
          python -m pip install pyinstaller

      - name: Download ffmpeg (Windows)
        shell: pwsh
        run: |
          python src/windows/get_ffmpeg.py
          if (Test-Path src/red_sprite_app/bin/windows/ffmpeg.exe) {
            Write-Host "ffmpeg bundled via get_ffmpeg.py"
          } else {
            Write-Host "get_ffmpeg.py failed; installing via choco and copying..."
            choco install ffmpeg -y --no-progress
            $ff = (Get-Command ffmpeg).Source
            $dir = (Get-Item $ff).DirectoryName
            New-Item -ItemType Directory -Force -Path src/red_sprite_app/bin/windows | Out-Null
            Copy-Item "$dir\ffmpeg.exe" src/red_sprite_app/bin/windows/
            Copy-Item "$dir\ffprobe.exe" src/red_sprite_app/bin/windows/
          }
          Write-Host "ffmpeg present: $(Test-Path src/red_sprite_app/bin/windows/ffmpeg.exe)"
          Write-Host "ffprobe present: $(Test-Path src/red_sprite_app/bin/windows/ffprobe.exe)"

      - name: Build executable with PyInstaller
        run: python -m PyInstaller src/windows/red_sprite_filter.spec --noconfirm --clean

      - name: Verify and checksum
        shell: pwsh
        run: |
          if (-not (Test-Path dist/red-sprite-filter.exe)) {
            Write-Error "EXE NOT FOUND - build failed"
            exit 1
          }
          $hash = (Get-FileHash dist/red-sprite-filter.exe -Algorithm SHA256).Hash
          "$hash  red-sprite-filter.exe" | Out-File -Encoding ascii dist/red-sprite-filter.exe.sha256
          Write-Host "Built red-sprite-filter.exe  SHA256=$hash  Size=$(((Get-Item dist/red-sprite-filter.exe).Length / 1MB).ToString('0.0')) MB"

      - name: Publish to Windows release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows
          name: Windows Build
          prerelease: false
          body: |
            Automated Windows build of 红色精灵筛选器 (Red Sprite Filter).

            - Download `red-sprite-filter.exe` and double-click to run (portable, no install needed).
            - ffmpeg / ffprobe are bundled, so no extra setup is required.
            - Requires Windows 10/11 with Microsoft Edge WebView2 (preinstalled on Win10/11).
          files: |
            dist/red-sprite-filter.exe
            dist/red-sprite-filter.exe.sha256
